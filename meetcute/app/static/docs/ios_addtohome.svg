<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, sans-serif">
  <!-- Step 1: Safari with share button -->
  <g transform="translate(20, 20)">
    <rect width="220" height="440" rx="32" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2"/>
    <!-- screen -->
    <rect x="10" y="10" width="200" height="420" rx="22" fill="#ffffff"/>
    <!-- URL bar -->
    <rect x="20" y="20" width="180" height="32" rx="10" fill="#f4f4f5"/>
    <text x="32" y="41" font-size="11" fill="#71717a">🔒 meetcute.app</text>
    <!-- content -->
    <rect x="20" y="62" width="180" height="60" rx="8" fill="#fce7f3"/>
    <text x="60" y="100" font-size="14" fill="#ec4899">💘 meetcute</text>
    <rect x="20" y="130" width="180" height="220" rx="8" fill="#f4f4f5"/>
    <text x="40" y="155" font-size="10" fill="#71717a">매물 카드들...</text>
    <!-- bottom toolbar -->
    <line x1="10" y1="365" x2="210" y2="365" stroke="#e4e4e7" stroke-width="1"/>
    <text x="30" y="395" font-size="20" fill="#71717a">◀</text>
    <text x="60" y="395" font-size="20" fill="#71717a">▶</text>
    <!-- share button highlighted -->
    <rect x="92" y="375" width="36" height="36" rx="8" fill="#fbcfe8" stroke="#ec4899" stroke-width="2"/>
    <text x="98" y="400" font-size="20">⬆</text>
    <text x="150" y="395" font-size="20" fill="#71717a">📑</text>
    <text x="180" y="395" font-size="20" fill="#71717a">📚</text>
    <!-- annotation -->
    <text x="110" y="430" font-size="10" fill="#ec4899" text-anchor="middle">공유 버튼 누르기</text>
  </g>

  <!-- arrow -->
  <text x="270" y="245" font-size="40" fill="#ec4899">→</text>

  <!-- Step 2: action menu -->
  <g transform="translate(320, 20)">
    <rect width="220" height="440" rx="32" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2"/>
    <rect x="10" y="10" width="200" height="420" rx="22" fill="#ffffff"/>
    <!-- dimmed background -->
    <rect x="10" y="10" width="200" height="280" fill="#52525b" opacity="0.4"/>
    <!-- action sheet -->
    <rect x="10" y="170" width="200" height="260" fill="#f4f4f5"/>
    <text x="110" y="195" font-size="11" fill="#71717a" text-anchor="middle">meetcute.app</text>
    <line x1="20" y1="210" x2="200" y2="210" stroke="#e4e4e7"/>
    <!-- options -->
    <rect x="20" y="220" width="180" height="36" rx="8" fill="white"/>
    <text x="32" y="243" font-size="12" fill="#3f3f46">📋  복사</text>
    <rect x="20" y="262" width="180" height="36" rx="8" fill="white"/>
    <text x="32" y="285" font-size="12" fill="#3f3f46">🔖  책갈피 추가</text>
    <!-- highlighted: Add to Home Screen -->
    <rect x="20" y="304" width="180" height="36" rx="8" fill="#fbcfe8" stroke="#ec4899" stroke-width="2"/>
    <text x="32" y="327" font-size="12" fill="#be185d" font-weight="bold">➕  홈 화면에 추가</text>
    <rect x="20" y="346" width="180" height="36" rx="8" fill="white"/>
    <text x="32" y="369" font-size="12" fill="#3f3f46">📷  마크업</text>
    <rect x="20" y="388" width="180" height="36" rx="8" fill="white"/>
    <text x="32" y="411" font-size="12" fill="#3f3f46">📤  공유</text>
  </g>

  <!-- arrow -->
  <text x="570" y="245" font-size="40" fill="#ec4899">→</text>

  <!-- Step 3: home screen with icon -->
  <g transform="translate(620, 20)">
    <rect width="160" height="440" rx="28" fill="#1e293b"/>
    <rect x="8" y="8" width="144" height="424" rx="22" fill="url(#bg)"/>
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fbcfe8"/>
        <stop offset="100%" stop-color="#a78bfa"/>
      </linearGradient>
    </defs>
    <!-- time -->
    <text x="80" y="45" font-size="32" fill="white" text-anchor="middle" font-weight="200">12:45</text>
    <!-- app grid -->
    <g transform="translate(20, 80)">
      <rect width="32" height="32" rx="8" fill="#22c55e"/>
      <text x="16" y="22" font-size="14" text-anchor="middle">💬</text>
      <rect x="44" width="32" height="32" rx="8" fill="#3b82f6"/>
      <text x="60" y="22" font-size="14" text-anchor="middle">📧</text>
      <rect x="88" width="32" height="32" rx="8" fill="#eab308"/>
      <text x="104" y="22" font-size="14" text-anchor="middle">📷</text>
    </g>
    <g transform="translate(20, 130)">
      <rect width="32" height="32" rx="8" fill="#0ea5e9"/>
      <text x="16" y="22" font-size="14" text-anchor="middle">🎵</text>
      <rect x="44" width="32" height="32" rx="8" fill="#a855f7"/>
      <text x="60" y="22" font-size="14" text-anchor="middle">🎮</text>
      <!-- meetcute icon highlighted -->
      <rect x="83" y="-5" width="42" height="42" rx="10" fill="#ec4899" stroke="white" stroke-width="3"/>
      <text x="104" y="22" font-size="20" text-anchor="middle">💗</text>
      <text x="104" y="50" font-size="8" fill="white" text-anchor="middle">meetcute</text>
    </g>
    <text x="80" y="420" font-size="10" fill="white" text-anchor="middle" opacity="0.8">앱처럼 사용!</text>
  </g>
</svg>
