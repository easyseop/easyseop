{% extends "base.html" %}
{% block title %}비밀번호 재설정 (코드) · meetcute{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-12">
  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold">🔢 코드 입력</h1>
    <p class="text-sm text-neutral-500 mt-1">텔레그램으로 받은 6자리 코드 + 새 비밀번호</p>
  </div>

  <div class="bg-sky-50 border border-sky-200 text-sky-800 rounded-lg p-3 mb-4 text-xs">
    이메일이 등록돼 있고 텔레그램 연동돼 있으면 코드가 갔어요 (텔레그램 확인).
    {{ ttl_minutes }}분 안에 입력하세요.
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/forgot/code"
        class="bg-white border border-neutral-200 rounded-xl p-6 space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">이메일</label>
      <input type="email" name="email" required value="{{ email or '' }}"
             class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">6자리 코드</label>
      <input type="text" name="code" required inputmode="numeric" pattern="[0-9]{6}"
             maxlength="6" autocomplete="one-time-code" autofocus
             class="w-full px-3 py-2 border border-neutral-300 rounded-lg text-center tracking-widest text-lg font-mono" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">새 비밀번호 (10자 이상)</label>
      <input type="password" name="new_password" autocomplete="new-password" minlength="10" required
             class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">새 비밀번호 확인</label>
      <input type="password" name="new_password_confirm" autocomplete="new-password" minlength="10" required
             class="w-full px-3 py-2 border border-neutral-300 rounded-lg" />
    </div>
    <button class="w-full bg-pink-600 text-white py-2 rounded-lg font-medium hover:bg-pink-700">
      변경하고 로그인
    </button>
  </form>

  <div class="text-center text-sm text-neutral-500 mt-4">
    <a href="/auth/forgot" class="text-pink-600 hover:underline">← 코드 다시 받기</a>
  </div>
</div>
{% endblock %}
