{% extends "base.html" %}
{% block title %}매뉴얼 · meetcute{% endblock %}
{% block content %}
<div class="space-y-4">
  <h1 class="text-2xl font-bold">📖 매뉴얼</h1>
  <p class="text-sm text-neutral-600">아래 카테고리 중 하나를 선택해주세요.</p>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
    {% for key, meta in sections.items() %}
    <a href="/manual/{{ key }}" class="block bg-white border border-neutral-200 rounded-xl p-5 hover:border-pink-300 hover:shadow-sm transition">
      <div class="text-4xl mb-2">{{ meta.icon }}</div>
      <div class="font-semibold mb-1">{{ meta.title }}</div>
      <div class="text-xs text-neutral-500">{{ meta.summary }}</div>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
