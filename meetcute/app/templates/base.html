<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}meetcute{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-neutral-50 text-neutral-900 min-h-screen">
  <nav class="bg-white border-b border-neutral-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-bold text-lg tracking-tight">💘 meetcute</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="/persons" class="hover:text-pink-600">매물</a>
        <a href="/persons/new" class="px-3 py-1.5 bg-pink-600 text-white rounded-full hover:bg-pink-700">+ 새 매물</a>
      </div>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
